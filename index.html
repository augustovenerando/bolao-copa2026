<script type="module">

import {
  initializeApp
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  query,
  where,
  getDocs,
  addDoc
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyBe8zvoZA5R7ErCjBhLWM8oK6athl7pu-0",

  authDomain:
  "bolao-copa-2026-9f20b.firebaseapp.com",

  projectId:
  "bolao-copa-2026-9f20b",

  storageBucket:
  "bolao-copa-2026-9f20b.firebasestorage.app",

  messagingSenderId:
  "955726811414",

  appId:
  "1:955726811414:web:8a4d82e90d4439a3e1c037"

};

const app =
  initializeApp(firebaseConfig);

const db =
  getFirestore(app);

window.enterBolao = async function(){

  const email =
    document
      .getElementById("email")
      .value
      .trim()
      .toLowerCase();

  const displayNameInput =
    document.getElementById("displayName");

  const displayName =
    displayNameInput.value.trim();

  const message =
    document.getElementById("loginMessage");

  if(!email){

    message.innerHTML =
      `<div class="warning">
        Digite um e-mail
      </div>`;

    return;

  }

  const q = query(
    collection(db, "users"),
    where("email", "==", email)
  );

  const querySnapshot =
    await getDocs(q);

  if(querySnapshot.empty){

    if(displayNameInput.style.display === "none"){

      displayNameInput.style.display = "block";

      message.innerHTML =
        `<div class="success">
          Novo usuário. Escolha um nome.
        </div>`;

      return;

    }

    if(!displayName){

      message.innerHTML =
        `<div class="warning">
          Digite um nome de exibição
        </div>`;

      return;

    }

    await addDoc(
      collection(db, "users"),
      {
        email,
        displayName,
        createdAt:
          new Date().toISOString(),
        isAdmin:false
      }
    );

    localStorage.setItem(
      "bolaoEmail",
      email
    );

    openDashboard(displayName);

  }else{

    const userData =
      querySnapshot.docs[0].data();

    localStorage.setItem(
      "bolaoEmail",
      email
    );

    openDashboard(
      userData.displayName
    );

  }

}

function openDashboard(name){

  document
    .getElementById("loginScreen")
    .style.display = "none";

  document
    .getElementById("dashboard")
    .style.display = "block";

  document
    .getElementById("welcomeText")
    .innerText =
      `Olá, ${name}`;

  loadRanking();

  loadFakeMatches();

}

window.logout = function(){

  localStorage.removeItem(
    "bolaoEmail"
  );

  location.reload();

}

async function loadRanking(){

  const rankingDiv =
    document.getElementById(
      "rankingList"
    );

  const q =
    query(collection(db, "users"));

  const querySnapshot =
    await getDocs(q);

  let html = "";

  let position = 1;

  querySnapshot.forEach((doc)=>{

    const user = doc.data();

    html += `
      <div class="rankingItem">
        🏆 ${position}º -
        ${user.displayName}
      </div>
    `;

    position++;

  });

  rankingDiv.innerHTML = html;

}

async function loadFakeMatches(){

  const matchesDiv =
    document.getElementById(
      "matchesList"
    );

  matchesDiv.innerHTML = `

    <div class="match">

        🇧🇷 Brasil vs 🇦🇷 Argentina
      </div>

      <div>

      <div class="scoreInputs">

        <input
          type="number"
          placeholder="Brasil"
        >

        <strong>x</strong>

        <input
          type="number"
          placeholder="Argentina"
        >

      </div>

      <button>
        Salvar Palpite
      </button>

    </div>

    <div class="match">

      <div class="teams">
        🇫🇷 França vs 🇪🇸 Espanha
      </div>

      <div>
        Quartas de Final
      </div>

      <br>

      <div class="scoreInputs">

        <input
          type="number"
          placeholder="França"
        >

        <strong>x</strong>

        <input
          type="number"
          placeholder="Espanha"
        >

      </div>

      <button>
        Salvar Palpite
      </button>

    </div>

  `;

}

const savedEmail =
  localStorage.getItem(
    "bolaoEmail"
  );

if(savedEmail){

  autoLogin(savedEmail);

}

async function autoLogin(email){

  const q = query(
    collection(db, "users"),
    where("email", "==", email)
  );

  const querySnapshot =
    await getDocs(q);

  if(!querySnapshot.empty){

    const userData =
      querySnapshot.docs[0].data();

    document
      .getElementById("email")
      .value = email;

    openDashboard(
      userData.displayName
    );

  }

}

</script>

</body>
</html>

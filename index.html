<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bolão Copa 2026</title>

  <style>
    *{ box-sizing:border-box; }

    :root{
      --red:#e60000;
      --dark-red:#831313;
      --orange:#ff3d0b;
      --purple:#6d00e8;
      --lilac:#a77cf4;
      --blue:#3454f5;
      --cyan:#55f0d0;
      --green:#05c855;
      --lime:#b2f000;
      --yellow:#eaff2e;
      --navy:#242b7f;
      --black:#050505;
      --white:#ffffff;
    }

    body{
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      background:
        linear-gradient(rgba(0,0,0,.62), rgba(0,0,0,.62)),
        url("https://s2-ge.glbimg.com/rUwiYSk9pAoPitC1iqWaj-0MW90=/0x0:1081x1081/984x0/smart/filters:strip_icc()/i.s3.glbimg.com/v1/AUTH_bc8228b6673f488aa253bbcb03c80ec5/internal_photos/bs/2023/r/w/q8AvjjQuqFTdoUo361JA/fwc26-official-emblem-8.jpg");
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
    }

    .container{
      max-width:1180px;
      margin:0 auto;
      padding:24px;
    }

    .hero{
      background:rgba(0,0,0,.82);
      border:4px solid var(--yellow);
      border-radius:28px;
      padding:24px;
      margin-bottom:22px;
      box-shadow:0 18px 50px rgba(0,0,0,.45);
    }

    .heroInner{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:24px;
      flex-wrap:wrap;
    }

    .logo{
      width:115px;
      background:white;
      border-radius:18px;
      padding:8px;
    }

    h1,h2,h3{ margin-top:0; }

    h1{
      color:white;
      font-size:36px;
      margin-bottom:8px;
    }

    .subtitle{
      color:white;
      margin:0;
      opacity:.9;
    }

    .paletteBar{
      height:12px;
      border-radius:999px;
      margin-top:18px;
      background:linear-gradient(90deg,var(--red),var(--orange),var(--purple),var(--blue),var(--cyan),var(--green),var(--yellow));
    }

    .card{
      background:rgba(255,255,255,.96);
      border-radius:22px;
      padding:22px;
      margin-bottom:20px;
      box-shadow:0 12px 30px rgba(0,0,0,.22);
    }

    input{
      width:100%;
      padding:12px;
      border:2px solid #ddd;
      border-radius:12px;
      margin-bottom:12px;
      font-size:15px;
    }

    button{
      border:none;
      border-radius:14px;
      padding:12px 16px;
      cursor:pointer;
      font-size:15px;
      font-weight:bold;
      background:var(--black);
      color:white;
    }

    button:disabled{
      background:#999;
      cursor:not-allowed;
    }

    .logoutBtn{ background:var(--red); }

    .topBar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .tabs{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .tabBtn{
      background:white;
      color:var(--black);
      border:2px solid var(--black);
    }

    .tabBtn.active{
      background:var(--black);
      color:white;
    }

    .badge{
      display:inline-block;
      background:var(--yellow);
      color:var(--black);
      padding:6px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:bold;
      margin-top:8px;
    }

    .screen{ display:none; }
    .screen.active{ display:block; }

    .matchesGrid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));
      gap:16px;
    }

    .match{
      border:3px solid var(--black);
      border-radius:20px;
      padding:16px;
      background:white;
      position:relative;
      overflow:hidden;
    }

    .countryBar{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:8px;
    }

    .matchMeta{
      font-size:13px;
      margin-top:14px;
      color:#444;
      line-height:1.5;
    }

    .teamsCompact{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:8px;
      margin-bottom:12px;
    }

    .teamCompact{
      display:flex;
      align-items:center;
      gap:7px;
      font-weight:bold;
      font-size:15px;
      width:42%;
    }

    .teamCompact.away{
      justify-content:flex-end;
      text-align:right;
    }

    .vs{
      font-weight:bold;
      font-size:14px;
      background:var(--black);
      color:white;
      padding:5px 8px;
      border-radius:999px;
    }

    .flag{
      width:28px;
      height:20px;
      object-fit:cover;
      border-radius:3px;
      border:1px solid #ddd;
      flex:none;
    }

    .scoreInputs{
      display:flex;
      align-items:center;
      gap:8px;
      margin:12px 0;
    }

    .scoreInputs input{
      width:70px;
      text-align:center;
      margin:0;
      padding:10px;
    }

    .lastPrediction{
      font-size:13px;
      padding:10px;
      background:#f3f4f6;
      border-radius:12px;
      margin-top:10px;
    }

    .rankingItem{
      padding:12px;
      border-radius:14px;
      margin-bottom:8px;
      background:#f3f4f6;
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .rankingItem:nth-child(1){
      background:linear-gradient(90deg, var(--yellow), white);
      border:2px solid var(--black);
    }

    .groupGrid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:16px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      font-size:14px;
      background:white;
      border-radius:14px;
      overflow:hidden;
    }

    th{
      background:var(--black);
      color:white;
      padding:9px;
      text-align:left;
    }

    td{
      padding:9px;
      border-bottom:1px solid #eee;
    }

    .teamCell{
      display:flex;
      align-items:center;
      gap:7px;
    }

    .success{
      color:#087f23;
      font-weight:bold;
      margin-top:10px;
    }

    .warning{
      color:#dc2626;
      font-weight:bold;
      margin-top:10px;
    }

    .adminNotice{
      display:inline-block;
      background:var(--orange);
      color:white;
      padding:5px 9px;
      border-radius:999px;
      font-size:12px;
      margin-top:8px;
      font-weight:bold;
    }

    @media(max-width:600px){
      .container{ padding:14px; }
      h1{ font-size:28px; }
      .logo{ width:90px; }
      .teamCompact{ font-size:13px; }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="hero">
    <div class="heroInner">
      <div>
        <h1>Bolão Copa 2026</h1>
        <p class="subtitle">Palpites, ranking, fases e classificação dos grupos</p>
        <span class="badge">FIFA World Cup 2026</span>
      </div>

      <img class="logo" alt="Logo Copa 2026" src="https://upload.wikimedia.org/wikipedia/pt/d/d7/Logo_copa_2026.png" />
    </div>

    <div class="paletteBar"></div>
  </div>

  <div id="loginScreen" class="card">
    <h2>Entrar no bolão</h2>

    <input type="email" id="email" placeholder="Seu e-mail" />

    <input type="text" id="displayName" placeholder="Nome de exibição" style="display:none;" />

    <button onclick="enterBolao()">Entrar</button>

    <div id="loginMessage"></div>
  </div>

  <div id="dashboard" style="display:none;">

    <div class="topBar">
      <div>
        <h2 id="welcomeText"></h2>
        <span class="badge">Seu painel do bolão</span>
      </div>

      <button class="logoutBtn" onclick="logout()">Sair</button>
    </div>

    <div class="tabs">
      <button class="tabBtn active" onclick="showScreen('matchesScreen', this)">⚽ Jogos</button>
      <button class="tabBtn" onclick="showScreen('rankingScreen', this)">🏅 Ranking</button>
      <button class="tabBtn" onclick="showScreen('groupsScreen', this)">📊 Grupos</button>
    </div>

    <div id="matchesScreen" class="screen active card">
      <h2>⚽ Jogos e Palpites</h2>
      <div id="matchesList">Carregando jogos...</div>
    </div>

    <div id="rankingScreen" class="screen card">
      <h2>🏅 Ranking Geral</h2>
      <div id="rankingList">Carregando ranking...</div>
    </div>

    <div id="groupsScreen" class="screen card">
      <h2>📊 Classificação dos Grupos</h2>
      <div id="groupsList">Carregando classificação...</div>
    </div>

  </div>

</div>

<script type="module">

window.enterBolao = async function(){

  const email = document.getElementById("email").value.trim().toLowerCase();
  const displayNameInput = document.getElementById("displayName");
  const displayName = displayNameInput.value.trim();
  const message = document.getElementById("loginMessage");

  if(!email){
    message.innerHTML = `<div class="warning">Digite um e-mail</div>`;
    return;
  }

  const q = query(collection(db, "users"), where("email", "==", email));
  const querySnapshot = await getDocs(q);

  if(querySnapshot.empty){

    if(displayNameInput.style.display === "none"){
      displayNameInput.style.display = "block";
      message.innerHTML = `<div class="success">Novo usuário. Escolha um nome.</div>`;
      return;
    }

    if(!displayName){
      message.innerHTML = `<div class="warning">Digite um nome de exibição</div>`;
      return;
    }

    const newUserRef = await addDoc(collection(db, "users"), {
      email,
      displayName,
      createdAt:new Date().toISOString(),
      isAdmin:false,
      totalPoints:0,
      exactScores:0,
      winnerHits:0
    });

    currentUser = {
      id:newUserRef.id,
      email,
      displayName
    };

    localStorage.setItem("bolaoEmail", email);
    openDashboard(displayName);

  }else{

    const userDoc = querySnapshot.docs[0];
    const userData = userDoc.data();

    currentUser = {
      id:userDoc.id,
      email:userData.email,
      displayName:userData.displayName
    };

    localStorage.setItem("bolaoEmail", email);
    openDashboard(userData.displayName);
  }
}

function openDashboard(name){
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
  document.getElementById("welcomeText").innerText = `Olá, ${name}`;

  loadMatches();
  loadRanking();
  loadGroups();
}

window.logout = function(){
  localStorage.removeItem("bolaoEmail");
  location.reload();
}

window.showScreen = function(screenId, btn){
  document.querySelectorAll(".screen").forEach(screen=>screen.classList.remove("active"));
  document.querySelectorAll(".tabBtn").forEach(button=>button.classList.remove("active"));
  document.getElementById(screenId).classList.add("active");
  btn.classList.add("active");
}

function flagUrl(code){
  return `https://flagcdn.com/w40/${code}.png`;
}

function formatDate(dateString){
  return new Date(dateString).toLocaleString("pt-BR", {
    day:"2-digit",
    month:"2-digit",
    year:"numeric",
    hour:"2-digit",
    minute:"2-digit"
  });
}

function getLockDate(dateString){
  return new Date(new Date(dateString).getTime() - 60 * 60 * 1000);
}

function formatLockDate(dateString){
  return getLockDate(dateString).toLocaleString("pt-BR", {
    day:"2-digit",
    month:"2-digit",
    year:"numeric",
    hour:"2-digit",
    minute:"2-digit"
  });
}

function isLocked(dateString){
  return new Date() >= getLockDate(dateString);
}

function countryBar(home, away){
  const h = teamColors[home] || ["#111111","#cccccc"];
  const a = teamColors[away] || ["#cccccc","#111111"];

  return `linear-gradient(
    90deg,
    ${h[0]} 0%,
    ${h[1]} 24%,
    #ffffff 50%,
    ${a[0]} 76%,
    ${a[1]} 100%
  )`;
}

async function getPrediction(matchId){
  if(!currentUser) return null;

  const predictionId = `${currentUser.id}_${matchId}`;
  const predictionRef = doc(db, "predictions", predictionId);
  const predictionSnap = await getDoc(predictionRef);

  if(predictionSnap.exists()){
    return predictionSnap.data();
  }

  return null;
}

window.savePrediction = async function(matchId){

  const match = sampleMatches.find(m=>m.id === matchId);

  if(!match) return;

  if(isLocked(match.date)){
    alert("O prazo para registrar palpite deste jogo já encerrou.");
    return;
  }

  const homeInput = document.getElementById(`home_${matchId}`);
  const awayInput = document.getElementById(`away_${matchId}`);

  const homeScore = Number(homeInput.value);
  const awayScore = Number(awayInput.value);

  if(homeInput.value === "" || awayInput.value === "" || homeScore < 0 || awayScore < 0){
    alert("Preencha o placar completo do palpite.");
    return;
  }

  const predictionId = `${currentUser.id}_${matchId}`;

  const predictionData = {
    userId:currentUser.id,
    userEmail:currentUser.email,
    displayName:currentUser.displayName,
    matchId,
    homeTeam:match.home,
    awayTeam:match.away,
    predictedHomeScore:homeScore,
    predictedAwayScore:awayScore,
    updatedAt:new Date().toISOString(),
    matchDate:match.date,
    lockDate:getLockDate(match.date).toISOString()
  };

  await setDoc(
    doc(db, "predictions", predictionId),
    predictionData,
    { merge:true }
  );

  await addDoc(
    collection(db, "predictionHistory"),
    {
      ...predictionData,
      savedAt:new Date().toISOString()
    }
  );

  alert("Palpite salvo com sucesso.");

  loadMatches();
}

async function loadMatches(){

  const matchesDiv = document.getElementById("matchesList");

  let html = `<div class="matchesGrid">`;

  for(const match of sampleMatches){

    const locked = isLocked(match.date);
    const prediction = await getPrediction(match.id);

    const resultText =
      match.homeScore === null
        ? "Resultado ainda não registrado"
        : `Resultado: ${match.homeScore} x ${match.awayScore}`;

    const lastPredictionText =
      prediction
        ? `${match.home} ${prediction.predictedHomeScore} x ${prediction.predictedAwayScore} ${match.away}<br><small>Registrado em: ${formatDate(prediction.updatedAt)}</small>`
        : "Não há palpite registrado";

    html += `
      <div class="match">

        <div class="countryBar" style="background:${countryBar(match.home, match.away)};"></div>

        <div class="teamsCompact">

          <div class="teamCompact">
            <img class="flag" src="${flagUrl(match.homeCode)}" alt="${match.home}">
            <span>${match.home}</span>
          </div>

          <div class="vs">x</div>

          <div class="teamCompact away">
            <span>${match.away}</span>
            <img class="flag" src="${flagUrl(match.awayCode)}" alt="${match.away}">
          </div>

        </div>

        <div class="matchMeta">
          <strong>${match.phase}</strong> · Grupo ${match.group}<br>
          <strong>Data:</strong> ${formatDate(match.date)}<br>
          <strong>Local:</strong> ${match.stadium}<br>
          <strong>Data / hora limite para registro do palpite:</strong> ${formatLockDate(match.date)}<br>
          <strong>${resultText}</strong>
        </div>

        ${match.admin ? `<div class="adminNotice">Dado inserido pelo administrador</div>` : ""}

        <div class="scoreInputs">
          <input
            id="home_${match.id}"
            type="number"
            min="0"
            placeholder="${match.home}"
            value="${prediction ? prediction.predictedHomeScore : ""}"
            ${locked ? "disabled" : ""}
          >

          <strong>x</strong>

          <input
            id="away_${match.id}"
            type="number"
            min="0"
            placeholder="${match.away}"
            value="${prediction ? prediction.predictedAwayScore : ""}"
            ${locked ? "disabled" : ""}
          >
        </div>

        <button onclick="savePrediction('${match.id}')" ${locked ? "disabled" : ""}>
          ${locked ? "Palpite encerrado" : "Salvar Palpite"}
        </button>

        <div class="lastPrediction">
          <strong>Último palpite:</strong><br>
          ${lastPredictionText}
        </div>

      </div>
    `;
  }

  html += `</div>`;

  matchesDiv.innerHTML = html;
}

async function loadRanking(){

  const rankingDiv = document.getElementById("rankingList");
  const q = query(collection(db, "users"));
  const querySnapshot = await getDocs(q);

  let users = [];

  querySnapshot.forEach(doc=>{
    const user = doc.data();

    users.push({
      displayName:user.displayName || "Sem nome",
      totalPoints:user.totalPoints || 0,
      exactScores:user.exactScores || 0,
      winnerHits:user.winnerHits || 0
    });
  });

  users.sort((a,b)=>{
    if(b.totalPoints !== a.totalPoints) return b.totalPoints - a.totalPoints;
    if(b.exactScores !== a.exactScores) return b.exactScores - a.exactScores;
    return b.winnerHits - a.winnerHits;
  });

  if(users.length === 0){
    rankingDiv.innerHTML = "Nenhum participante cadastrado ainda.";
    return;
  }

  let html = "";

  users.forEach((user,index)=>{

    const medal =
      index === 0 ? "🥇" :
      index === 1 ? "🥈" :
      index === 2 ? "🥉" :
      "🏆";

    html += `
      <div class="rankingItem">
        <div>${medal} <strong>${index + 1}º - ${user.displayName}</strong></div>
        <div>${user.totalPoints} pts · ${user.exactScores} exatos · ${user.winnerHits} vencedores</div>
      </div>
    `;
  });

  rankingDiv.innerHTML = html;
}

function loadGroups(){

  const groupsDiv = document.getElementById("groupsList");
  const teams = {};

  sampleMatches.forEach(match=>{

    if(!teams[match.group]) teams[match.group] = {};

    [match.home, match.away].forEach((teamName, index)=>{

      const code = index === 0 ? match.homeCode : match.awayCode;

      if(!teams[match.group][teamName]){
        teams[match.group][teamName] = {
          name:teamName,
          code,
          points:0,
          played:0,
          wins:0,
          draws:0,
          losses:0,
          goalsFor:0,
          goalsAgainst:0,
          goalDiff:0
        };
      }
    });

    if(match.homeScore === null || match.awayScore === null) return;

    const home = teams[match.group][match.home];
    const away = teams[match.group][match.away];

    home.played++;
    away.played++;

    home.goalsFor += match.homeScore;
    home.goalsAgainst += match.awayScore;

    away.goalsFor += match.awayScore;
    away.goalsAgainst += match.homeScore;

    if(match.homeScore > match.awayScore){
      home.points += 3;
      home.wins++;
      away.losses++;
    }else if(match.homeScore < match.awayScore){
      away.points += 3;
      away.wins++;
      home.losses++;
    }else{
      home.points += 1;
      away.points += 1;
      home.draws++;
      away.draws++;
    }

    home.goalDiff = home.goalsFor - home.goalsAgainst;
    away.goalDiff = away.goalsFor - away.goalsAgainst;
  });

  let html = `<div class="groupGrid">`;

  Object.keys(teams).sort().forEach(group=>{

    const groupTeams = Object.values(teams[group]).sort((a,b)=>{
      if(b.points !== a.points) return b.points - a.points;
      if(b.goalDiff !== a.goalDiff) return b.goalDiff - a.goalDiff;
      return b.goalsFor - a.goalsFor;
    });

    html += `
      <div>
        <h3>Grupo ${group}</h3>
        <table>
          <thead>
            <tr>
              <th>Seleção</th>
              <th>J</th>
              <th>Pts</th>
              <th>SG</th>
            </tr>
          </thead>
          <tbody>
    `;

    groupTeams.forEach(team=>{
      html += `
        <tr>
          <td>
            <div class="teamCell">
              <img class="flag" src="${flagUrl(team.code)}" alt="${team.name}">
              ${team.name}
            </div>
          </td>
          <td>${team.played}</td>
          <td><strong>${team.points}</strong></td>
          <td>${team.goalDiff}</td>
        </tr>
      `;
    });

    html += `
          </tbody>
        </table>
      </div>
    `;
  });

  html += `</div>`;

  groupsDiv.innerHTML = html;
}

const savedEmail = localStorage.getItem("bolaoEmail");

if(savedEmail){
  autoLogin(savedEmail);
}

async function autoLogin(email){

  const q = query(collection(db, "users"), where("email", "==", email));
  const querySnapshot = await getDocs(q);

  if(!querySnapshot.empty){

    const userDoc = querySnapshot.docs[0];
    const userData = userDoc.data();

    currentUser = {
      id:userDoc.id,
      email:userData.email,
      displayName:userData.displayName
    };

    document.getElementById("email").value = email;
    openDashboard(userData.displayName);
  }
}
